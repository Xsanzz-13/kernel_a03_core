name: Build Kernel A03 Core
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Toolchain & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential bison flex libssl-dev libelf-dev wget
          
          # MIRROR GCC 4.9 (Dari GitHub, bukan Google)
          git clone --depth=1 https://github.com/mvaisakh/gcc-arm64 gcc64
          
          # MIRROR CLANG (Dari GitHub)
          mkdir clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/10.0.9-20200513-binutils-2.34/Clang-10.0.9-20200513-binutils-2.34.tar.gz
          tar -xf Clang-10.0.9-20200513-binutils-2.34.tar.gz -C clang

      - name: Build Kernel
        run: |
          export PATH=$(pwd)/clang/bin:$(pwd)/gcc64/bin:$PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # 1. Konfigurasi
          make O=out CC=clang LD=ld.lld a3core_eur_open_defconfig

          # 2. Compile
          make -j$(nproc --all) O=out CC=clang LD=ld.lld BSP_BUILD_DT_OVERLAY=y

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A03Core-Image
          path: out/arch/arm64/boot/Image
