name: Build Kernel A03 Core
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Toolchain & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential bison flex libssl-dev libelf-dev
          
          # 1. Download GCC 4.9 (Link terbukti lancar di log lu)
          git clone --depth=1 https://github.com/mvaisakh/gcc-arm64 gcc64
          
          # 2. Download Clang (Link crDroid pilihan lu yang PASTI 100% OK)
          git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6443078 clang

      - name: Build Kernel
        run: |
          # Setup PATH Absolut
          GCC_BIN=$(pwd)/gcc64/bin
          CLANG_BIN=$(pwd)/clang/bin
          export PATH=$CLANG_BIN:$GCC_BIN:$PATH
          
          # Variabel Utama
          export ARCH=arm64
          # PAKAI PREFIX ANDROID (Sesuai isi folder gcc64/bin)
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          # Bersihkan sisa gagal
          make O=out clean
          make O=out mrproper

          # 1. Konfigurasi
          make O=out CC=clang CROSS_COMPILE=aarch64-linux-android- a3core_eur_open_defconfig

          # 2. Compile (Hajar pake LLVM tools biar sinkron)
          make -j$(nproc --all) O=out \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-android- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            OBJSIZE=llvm-size \
            READELF=llvm-readelf \
            HOSTCC=gcc \
            HOSTCXX=g++ \
            BSP_BUILD_DT_OVERLAY=y

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A03Core-Image
          path: out/arch/arm64/boot/Image
