name: Build Kernel A03 Core
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Toolchain & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential bison flex libssl-dev libelf-dev
          
          # Download GCC & Clang (Link crDroid pilihan lu yang udah terbukti lancar)
          git clone --depth=1 https://github.com/mvaisakh/gcc-arm64 gcc64
          git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6443078 clang

      - name: Build Kernel
        run: |
          # JALUR PASTI: Kita pakai Path Absolut biar gak nyasar
          WORKING_DIR=$(pwd)
          CLANG_BIN=$WORKING_DIR/clang/bin
          GCC_BIN=$WORKING_DIR/gcc64/bin
          
          # Tambahkan ke PATH sistem
          export PATH=$CLANG_BIN:$GCC_BIN:$PATH
          
          # Variabel Lingkungan
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          # Hapus sisa-sisa gagal
          make O=out clean
          make O=out mrproper

          # 1. Konfigurasi
          make O=out CC=clang CROSS_COMPILE=aarch64-linux-android- a3core_eur_open_defconfig

          # 2. PROSES COMPILE (Gue tambahin argumen buat bypass error stack-protector)
          make -j$(nproc --all) O=out \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-android- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CONFIG_CC_STACKPROTECTOR_STRONG=y \
            BSP_BUILD_DT_OVERLAY=y

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A03Core-Image
          path: out/arch/arm64/boot/Image
